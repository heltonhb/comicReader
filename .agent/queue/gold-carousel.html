<!DOCTYPE html>
<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --primary-gold: #D4AF37;
            --secondary-silver: #C0C0C0;
            --dark-bg: #0D0D0D;
            --glow-red: #8B0000;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .snap-container {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
            scrollbar-width: none;}
        .snap-container::-webkit-scrollbar {
            display: none;}
        .snap-item {
            scroll-snap-align: start;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 120px 20px 180px 20px;
        }
        .comic-cover-container {
            width: 100%;
            aspect-ratio: 9/16;
            max-width: 320px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .comic-cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .luxury-header {
            background: linear-gradient(to bottom, rgba(13,13,13,1) 0%, rgba(13,13,13,0.8) 80%, rgba(13,13,13,0) 100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 40px 20px 30px;
            text-align: center;
        }
        .luxury-button-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            text-align: center;
        }
        .glow-button {
            background: radial-gradient(circle at center, #B22222, #800000);
            box-shadow: 0 0 25px rgba(178, 34, 34, 0.5);
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-white">
<header class="luxury-header flex flex-col items-center">
<div class="w-full flex justify-end px-4 absolute top-8">

<span class="material-symbols-outlined text-4xl">close</span>
</button>
</div>
<h1 class="text-[var(--secondary-silver)] uppercase tracking-[0.2em] text-lg font-light">Sua</h1>

<h2 class="text-[var(--primary-gold)] uppercase tracking-[0.3em] text-2xl font-bold">Digital</h2>
</header>
<main class="snap-container">
<section class="snap-item">

</div>
<div class="mt-8 text-center px-6">
<p class="text-[var(--primary-gold)] text-xs tracking-widest uppercase mb-1 opacity-80">HQ Interativa</p>
<h3 class="text-xl font-light text-white tracking-wide">Volume 1 — <span class="font-normal">História</span></h3>
</div>
</section>
<section class="snap-item">
<div class="comic-cover-container">
<img alt="Volume 2" class="comic-cover-image" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBF4Et8VoQGKuVqtXEgaRcDcRMYwAiA4uk1NGP_TrhjjlKw67qN7cS0XnzQQyg_BG8Jjq6N6pWLshFvld_EY2VibQfB5ri5NlS9EDMKvkze_6Tuqu2WvzS8eEEO9Ay_AGYYUPQWB_d83YV6TNm6mDQJxY5j04TxqVKDiSJ4uSvdjEFgDrL5N8Kk9v_fiuoqWDB5l_HnADmhi75oQrO5ANMTLVid7Xcm12FCPYokd3g-xC1Uk4gz9XqmOsiTZDfFlEN7nyB5n5-um_s"/>
</div>
<div class="mt-8 text-center px-6">
<p class="text-[var(--primary-gold)] text-xs tracking-widest uppercase mb-1 opacity-80">HQ Interativa</p>
<h3 class="text-xl font-light text-white tracking-wide">Volume 2 — <span class="font-normal">Português</span></h3>
</div>
</section>
<section class="snap-item">
<div class="comic-cover-container">
<img alt="Volume 3" class="comic-cover-image" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDl1fmr4UGTLOdFGbkmsKMmjnA6FzCXANM9fF83tqa7rF9B5G1ApmDKADDTuygOOC91be5GmpLHk82mM4DtJ-my1shFK98zsOTELiFd30rC5kFlmSwROGWz1CTjI-FmHrHJn8nBsMiCgQVViIKV0SJURNoY_U03sloL_2qoPnHEFdZyoMAmo3kCs3tfNr_GAIWo9mwm75Rf2PF9-8bYy9lgqOlymtut71H7ChjfZlP5e6FtY_NToXxY5BQtObhs8-cvN1XtPtp6GEc"/>
</div>
<div class="mt-8 text-center px-6">
<p class="text-[var(--primary-gold)] text-xs tracking-widest uppercase mb-1 opacity-80">HQ Interativa</p>
<h3 class="text-xl font-light text-white tracking-wide">Volume 3 — <span class="font-normal">Ciências</span></h3>
</div>
</section>
</main>
<div class="luxury-button-container">
<button class="glow-button">
<span class="material-symbols-outlined text-white text-3xl mb-1">book_2</span>
<span class="text-[10px] leading-tight font-bold uppercase tracking-tighter">Começar<br/>Leitura</span>
</button>
<div class="flex gap-2 justify-center mt-6">
<div class="w-1.5 h-1.5 rounded-full bg-white/20"></div>
<div class="w-1.5 h-1.5 rounded-full bg-[var(--glow-red)]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-white/20"></div>
</div>
</div>

</body></html>
