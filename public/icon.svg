<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D0AC" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA8A2E" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B22222" />
      <stop offset="100%" stop-color="#600000" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Isometric Book Base -->
  <g transform="translate(0, 50)">
    <!-- Back Cover -->
    <path d="M100 150 L300 250 L460 170 L260 70 Z" fill="#4a0000" />
    <!-- Pages Block -->
    <path d="M110 145 L300 240 L450 165 L260 80 Z" fill="#F5F5F0" />
    <path d="M110 145 L110 185 L300 280 L300 240 Z" fill="#E5D0AC" /> <!-- Page Thickness Left -->
    <path d="M300 280 L450 205 L450 165 L300 240 Z" fill="#D4AF37" /> <!-- Page Thickness Right -->
    
    <!-- Front Cover (Red) -->
    <path d="M110 320 L300 415 L450 340" fill="none" stroke="url(#redGradient)" stroke-width="0" /> <!-- Abstract spine/base hint -->
    <path d="M100 185 L300 285 L460 205" fill="none" class="book-spine" />
  </g>

  <!-- Comic "Action Burst" Bubble -->
  <g transform="translate(256, 200) scale(1.2)">
     <!-- Shadow -->
    <path d="M-80 -20 L-50 -60 L-10 -50 L30 -90 L60 -40 L100 -50 L80 0 L110 40 L60 50 L30 90 L-10 60 L-60 80 L-50 20 L-90 0 Z" 
          fill="black" fill-opacity="0.3" transform="translate(10, 20)" filter="url(#glow)" />
    
    <!-- Burst Shape -->
    <path d="M-80 -20 L-50 -60 L-10 -50 L30 -90 L60 -40 L100 -50 L80 0 L110 40 L60 50 L30 90 L-10 60 L-60 80 L-50 20 L-90 0 Z" 
          fill="url(#goldGradient)" stroke="#F5F5F0" stroke-width="4" stroke-linejoin="round" />
          
    <!-- Plus Symbol Cutout -->
    <path d="M-20 -60 L20 -60 L20 -20 L60 -20 L60 20 L20 20 L20 60 L-20 60 L-20 20 L-60 20 L-60 -20 L-20 -20 Z" 
          fill="#8B0000" />
  </g>
  
  <!-- "Comic" Speed Lines -->
  <path d="M50 400 L150 350" stroke="url(#goldGradient)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <path d="M460 400 L360 350" stroke="url(#goldGradient)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <path d="M256 50 L256 100" stroke="url(#goldGradient)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

</svg>
